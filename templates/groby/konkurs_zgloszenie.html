{% extends 'base.html' %}
{% load antybot %}

{% block title %}Zgłoszenie konkursowe — {{ konkurs.nazwa }}{% endblock %}

{% block content %}
<section class="max-w-2xl mx-auto px-4 py-10">
    <h1 class="font-serif text-3xl text-primary-900 mb-2">Zgłoszenie konkursowe</h1>
    <p class="text-primary-600 mb-6">{{ konkurs.nazwa }}</p>

    <form method="post" enctype="multipart/form-data" class="bg-white rounded-lg shadow-soft border border-cream-200 p-6 space-y-4">
        {% csrf_token %}
        {% pole_antybot %}
        <label class="block">
            <span class="block text-sm text-primary-700 mb-1">Twoje imię (lub pseudonim)</span>
            <input type="text" name="autor_imie" maxlength="100" class="w-full border border-cream-200 rounded px-3 py-2">
        </label>
        <label class="block">
            <span class="block text-sm text-primary-700 mb-1">Tytuł zdjęcia</span>
            <input type="text" name="tytul" maxlength="200" class="w-full border border-cream-200 rounded px-3 py-2">
        </label>
        <label class="block">
            <span class="block text-sm text-primary-700 mb-1">Plik (JPG/PNG)</span>
            <input type="file" name="plik" accept="image/*" required class="block w-full">
        </label>
        <button type="submit" class="px-4 py-2 bg-accent-700 text-white rounded hover:bg-accent-800">Wyślij</button>
    </form>
</section>
{% endblock %}
