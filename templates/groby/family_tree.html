{% extends 'base.html' %}

{% block title %}Drzewo cmentarza — Informator Cmentarny Szydłów{% endblock %}

{% block content %}
<section class="max-w-7xl mx-auto px-4 py-10">
    <div class="text-xs uppercase tracking-widest text-accent-600 mb-2">Genealogia</div>
    <h1 class="font-serif text-4xl text-primary-900 mb-2">Drzewo całego cmentarza</h1>
    <p class="text-primary-600 mb-6">Sieć wszystkich relacji rodzinnych w bazie. Przeciągnij węzły, scrolluj aby zoom.</p>

    <div id="tree" class="bg-white rounded-lg shadow-soft border border-cream-200" style="height: 75vh; overflow: hidden;"></div>
</section>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script>
(function () {
    const nodes = {{ nodes_json|safe }};
    const links = {{ links_json|safe }};
    if (!nodes.length) return;
    const cont = d3.select('#tree');
    const W = cont.node().clientWidth;
    const H = cont.node().clientHeight;
    const svg = cont.append('svg').attr('width', W).attr('height', H);
    const g = svg.append('g');
    const zoom = d3.zoom().scaleExtent([0.1, 4]).on('zoom', e => g.attr('transform', e.transform));
    svg.call(zoom);

    const sim = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(d => d.id).distance(40))
        .force('charge', d3.forceManyBody().strength(-50))
        .force('center', d3.forceCenter(W / 2, H / 2))
        .force('collide', d3.forceCollide(8));

    const KOLORY = { rodzic: '#2e4430', malzenstwo: '#b08d48', rodzenstwo: '#94ae93', inny: '#bfd0bd' };

    const link = g.append('g').selectAll('line').data(links).join('line')
        .attr('stroke', d => KOLORY[d.typ] || '#ccc').attr('stroke-width', 1.5).attr('opacity', 0.6);
    const node = g.append('g').selectAll('circle').data(nodes).join('circle')
        .attr('r', 4).attr('fill', '#3a553a').attr('stroke', '#fff').attr('stroke-width', 1)
        .call(d3.drag()
            .on('start', e => { if (!e.active) sim.alphaTarget(0.3).restart(); e.subject.fx = e.subject.x; e.subject.fy = e.subject.y; })
            .on('drag', e => { e.subject.fx = e.x; e.subject.fy = e.y; })
            .on('end', e => { if (!e.active) sim.alphaTarget(0); e.subject.fx = null; e.subject.fy = null; }));
    node.append('title').text(d => d.name);
    node.on('click', (e, d) => window.location.href = `/osoba/${d.id}/`);

    sim.on('tick', () => {
        link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        node.attr('cx', d => d.x).attr('cy', d => d.y);
    });
})();
</script>
{% endblock %}
